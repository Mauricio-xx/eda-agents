name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests (excluding SPICE)
        run: pytest tests/ -m "not spice" -v --tb=short

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check src/ tests/

  template-parity:
    # Keeps the LibreLane YAML templates under
    # src/eda_agents/agents/templates/ aligned with their vendored
    # upstream references under external/. The parity script asserts
    # byte-matching on VERBATIM_FIELDS (meta.version, VDD/GND nets,
    # PRIMARY_GDSII_STREAMOUT_TOOL) and the snapshot test guards
    # against accidental placeholder / whitespace drift. Kept in a
    # separate job so the main test matrix doesn't pay the cost of
    # cloning submodules.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run template snapshot + upstream parity tests
        run: |
          pytest tests/test_template_snapshot.py \
                 tests/test_template_upstream_parity.py \
                 -v --tb=short

      - name: Run parity script (belt-and-braces)
        run: python scripts/check_librelane_template_upstream.py all
