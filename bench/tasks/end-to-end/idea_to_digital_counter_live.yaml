id: e2e_idea_to_digital_counter_live
family: end-to-end
category: digital
domain: digital
pdk: gf180mcu
difficulty: hard
expected_backend: librelane
harness: callable
topology: counter_4bit
inputs:
  callable: eda_agents.bench.adapters:run_idea_to_digital_chip
  description: |
    4-bit synchronous up-counter with active-low asynchronous reset
    and an enable input. Inputs: clk, rst_n, en. Output: count[3:0].
    When en=1 and rst_n=1, count increments on each rising edge of
    clk. When rst_n=0, count returns to 0 asynchronously. When en=0,
    count holds its current value.
  design_name: counter4
  pdk: gf180mcu
  complexity: simple
  dry_run: false
  skip_gl_sim: false
  allow_dangerous: true
  max_budget_usd: 8.0
  timeout_s: 5400
  librelane_python: /home/montanares/git/librelane/.venv/bin/python
expected_metrics:
  gds_exists: {min: 1, unit: bool}
  gl_post_synth_ok: {min: 1, unit: bool}
  gl_post_pnr_ok: {min: 1, unit: bool}
scoring:
  - compile
  - sim_run
  - metrics_in_range
weight: 4.0
timeout_s: 5400
notes: |
  S11 Fase 0 LIVE gate. Exercises the full NL-idea -> digital-chip
  pipeline end-to-end: Claude Code CLI authors RTL + testbench +
  LibreLane config from the natural-language description, runs
  LibreLane through the GF180MCU-D flow, and the adapter verifies
  that a GDS was produced AND both post-synth and post-PnR
  gate-level simulations passed against the agent's own testbench.

  Requires simultaneously:
    - Claude Code CLI on PATH (`claude`).
    - A GF180MCU-D PDK reachable via PDK_ROOT or its wafer-space
      fork (same detection path as digital_counter_gf180.yaml).
    - LibreLane v3 venv + nix EDA tools (yosys >= 0.60, OpenROAD
      recent). The prompt prepends nix dirs via
      detect_nix_eda_tool_dirs.

  When any are missing the adapter returns FAIL_INFRA and the bench
  marks SKIPPED — keeps the bench honest without forcing a green
  fake PASS. Timeout generous (90 minutes) because LibreLane steps
  (Magic StreamOut especially) can take several minutes on GF180.
