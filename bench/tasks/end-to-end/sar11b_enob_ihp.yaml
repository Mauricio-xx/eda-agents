id: e2e_sar11b_enob_ihp
family: end-to-end
category: adc
domain: mixed
pdk: ihp_sg13g2
difficulty: hard
expected_backend: ngspice-osdi
harness: callable
topology: sar_adc_11bit
inputs:
  callable: eda_agents.bench.adapters:run_sar11_enob_measurement
  # topology_params left empty -> SARADC11BitTopology.default_params()
expected_metrics:
  ENOB: {min: 4.5, unit: bit}
  SNDR_dBc: {min: 28.0, unit: dB}
scoring:
  - compile
  - sim_run
  - metrics_in_range
weight: 2.0
timeout_s: 900
notes: |
  Runs the full SAR ADC 11-bit design_reference (S7) end-to-end on
  ngspice + PSP103 OSDI + Verilator SAR FSM. Closes gap #6 from the
  post-merge roadmap: previously there was no bench task that
  exercised SARADC11BitTopology.extract_enob / compute_adc_metrics.

  Thresholds match the topology's internal _SPEC_ENOB_MIN = 4.5 /
  _SPEC_SNDR_MIN = 28 dB after the S9-residual-closure recalibration
  (gap #6b): a 12-point Latin-square sweep across StrongARM input
  sizing, CDAC unit cap, and bias measured an architectural ceiling
  of ENOB=5.64 bit at (W=8, L=0.15, Cu=20 fF, Vb=0.5). Default
  params were shifted to that ceiling point in the same commit, so
  this task at defaults now lands at ENOB>=5.6 / SNDR>=35 dB with
  comfortable margin to the thresholds above. The measured-ceiling
  TSV is persisted under
  bench/results/sar11_ceiling_characterization/. The 9-bit
  aspirational ceiling is still tracked in
  docs/skills/sar_adc/TODO_calibration.md (items 2-5: tau_regen,
  LDO, bootstrap, corner sweep) — param tuning alone cannot close
  the gap from 5.64 bit to 9 bit.
