id: e2e_digital_counter_gf180
family: end-to-end
category: digital
domain: digital
pdk: gf180mcu
difficulty: easy
expected_backend: librelane
harness: callable
topology: counter_4bit
inputs:
  callable: eda_agents.bench.adapters:run_librelane_flow_task
  design_dir: bench/designs/counter_bench
  stop_after: Checker.KLayoutDRC
  cache_run_dir: true
expected_metrics:
  DRC_violations: {max: 0, unit: count}
scoring:
  - compile
  - sim_run
  - metrics_in_range
weight: 2.0
timeout_s: 1800
notes: |
  Closes gap #5. Hardens a 4-bit counter through LibreLane v3 on
  GF180MCU-D up to the ROUTE step (signoff is skipped — audit only
  requires DRC == 0, which KLayout emits before signoff). IHP
  SG13G2 is not targeted here because Magic StreamOut is still
  broken upstream (docs/upstream_issues/).

  The adapter publishes the hardened run_dir under
  bench/cache/librelane_runs/counter/runs/<tag>/ (symlink) so that
  gap #2's gl_sim_post_synth_counter task can auto-discover it.

  Skips gracefully (FAIL_INFRA -> SKIPPED) when:
    - The GF180 PDK is not reachable from PDK_ROOT / known paths.
    - LibreLane's Python interpreter is not found.
  This keeps CI hosts without the tooling honest about what they
  did NOT run.
