id: e2e_idea_to_digital_counter_cocotb_live
family: end-to-end
category: digital
domain: digital
pdk: gf180mcu
difficulty: medium
expected_backend: librelane
harness: callable
topology: counter_4bit
inputs:
  callable: eda_agents.bench.adapters:run_idea_to_digital_chip
  description: |
    4-bit synchronous up-counter with active-low asynchronous reset
    and an enable input. Inputs: clk, rst_n, en. Output: count[3:0].
    When en=1 and rst_n=1, count increments on each rising edge of
    clk. When rst_n=0, count returns to 0 asynchronously. When en=0,
    count holds its current value.
  design_name: counter4_cocotb
  pdk: gf180mcu
  complexity: simple
  tb_framework: cocotb
  dry_run: false
  skip_gl_sim: false
  allow_dangerous: true
  max_budget_usd: 6.0
  timeout_s: 5400
  librelane_python: /home/montanares/git/librelane/.venv/bin/python
expected_metrics:
  gds_exists: {min: 1, unit: bool}
  gl_post_synth_ok: {min: 1, unit: bool}
  gl_post_pnr_ok: {min: 1, unit: bool}
scoring:
  - compile
  - sim_run
  - metrics_in_range
weight: 2.0
timeout_s: 5400
notes: |
  S12-A Gap 2 gate: same counter4 idea + cocotb testbench as S11
  Fase 1.5, but now GlSimRunner drives the cocotb test against the
  post-synth and post-PnR netlists via a generated Makefile. The
  audit metrics match the iverilog variants exactly:
  ``gds_exists`` + ``gl_post_synth_ok`` + ``gl_post_pnr_ok``.

  Pre-S12-A this task asserted ``gl_sim_skipped=1`` because the
  cocotb path fell through to a clean skip in
  ``run_post_flow_gl_sim_check``. That early-return is gone; the
  same Makefile cocotb already uses for pre-synth sim is now
  re-emitted in ``runs/<tag>/gl_sim/post_synth/`` and
  ``runs/<tag>/gl_sim/post_pnr/`` with ``VERILOG_SOURCES`` pointing
  at the gate-level netlist + stdcell models.

  Env requirements:
  * ``PDK_ROOT=/path/to/wafer-space-gf180mcu``
  * ``EDA_AGENTS_ALLOW_DANGEROUS=1``
  * cocotb 2.x installed in the LibreLane venv (the
    ``librelane_python`` path above must point at that interp). The
    GL-sim runner derives the venv ``bin/`` from this path and
    prepends it to PATH so ``make sim`` finds ``cocotb-config``.
