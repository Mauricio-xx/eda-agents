id: e2e_idea_to_digital_counter
family: end-to-end
category: digital
domain: digital
pdk: gf180mcu
difficulty: easy
expected_backend: dry-run
harness: callable
topology: counter_4bit
inputs:
  callable: eda_agents.bench.adapters:run_idea_to_digital_chip
  description: |
    4-bit synchronous up-counter with active-low asynchronous reset
    and an enable input. Inputs: clk, rst_n, en. Output: count[3:0].
    When en=1 and rst_n=1, count increments on each rising edge of
    clk. When rst_n=0, count returns to 0 asynchronously. When en=0,
    count holds its current value.
  design_name: counter4
  pdk: gf180mcu
  complexity: simple
  dry_run: true
expected_metrics:
  prompt_length: {min: 2000, unit: chars}
scoring:
  - compile
  - metrics_in_range
weight: 2.0
timeout_s: 120
notes: |
  S11 Fase 0 gate. Validates the NL idea -> digital chip pipeline in
  offline / dry-run mode: the adapter builds the full from-spec prompt
  and checks PDK-root resolution without launching Claude Code or
  LibreLane. PASS means `build_from_spec_prompt` produced a
  reasonably-sized prompt (>= 2000 chars) for the counter description.

  Live variant (runs real CC CLI + LibreLane): see
  idea_to_digital_counter_live.yaml. Keep this dry-run task always
  green on CI hosts so the pipeline plumbing is audited.
