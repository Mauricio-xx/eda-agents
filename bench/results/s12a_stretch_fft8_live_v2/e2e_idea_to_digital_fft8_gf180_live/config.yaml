# GF180MCU LibreLane config for the 8-point FFT (fft8).

meta:
  version: 3
  flow: Classic
  substituting_steps:
    Magic.StreamOut: null
    KLayout.XOR: null

RUN_MAGIC_STREAMOUT: false
RUN_KLAYOUT_XOR: false

DESIGN_NAME: fft8
VERILOG_FILES:
  - dir::src/fft8.v
CLOCK_PORT: clk
CLOCK_PERIOD: 60

# Die area: 4 signed 8x16 multipliers + three 32-bit-wide complex register
# stages + bit-reversal wiring. GF180 180nm gives roughly ~6-12k cells;
# sized 500x500 for routing margin.
FP_SIZING: absolute
DIE_AREA: [0.0, 0.0, 500.0, 500.0]

VDD_NETS:
  - VDD
GND_NETS:
  - VSS

PRIMARY_GDSII_STREAMOUT_TOOL: klayout

DIODE_ON_PORTS: in
RT_MAX_LAYER: Metal4
PDN_MULTILAYER: false

PDN_VWIDTH: 5
PDN_HWIDTH: 5
PDN_VSPACING: 1
PDN_HSPACING: 1
PDN_VPITCH: 75
PDN_HPITCH: 75
PDN_EXTEND_TO: boundary

PL_TARGET_DENSITY_PCT: 55
MAX_FANOUT_CONSTRAINT: 10

CTS_CLK_MAX_WIRE_LENGTH: 0
CTS_DISTANCE_BETWEEN_BUFFERS: 0
CTS_SINK_CLUSTERING_SIZE: 20
CTS_SINK_CLUSTERING_MAX_DIAMETER: 60

DESIGN_REPAIR_MAX_SLEW_PCT: 35
DESIGN_REPAIR_MAX_CAP_PCT: 30
DESIGN_REPAIR_MAX_WIRE_LENGTH: 0

GRT_DESIGN_REPAIR_MAX_CAP_PCT: 20
GRT_DESIGN_REPAIR_MAX_SLEW_PCT: 20
GRT_DESIGN_REPAIR_MAX_WIRE_LENGTH: 0
RUN_POST_GRT_DESIGN_REPAIR: true

TOP_MARGIN_MULT: 1
BOTTOM_MARGIN_MULT: 1
LEFT_MARGIN_MULT: 6
RIGHT_MARGIN_MULT: 6
