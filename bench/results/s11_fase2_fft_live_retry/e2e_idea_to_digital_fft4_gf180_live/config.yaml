# GF180MCU LibreLane config for fft4 (4-point radix-2 DIT FFT, 8-bit signed real in, 10-bit signed complex out).

# Magic.StreamOut fails on current Magic/LibreLane builds with
# ``Error: invalid command name "units"`` -- a Tcl compatibility
# regression in the magic script path. We adopt klayout as the
# primary streamout tool (PRIMARY_GDSII_STREAMOUT_TOOL below), so
# Magic's streamout output is not needed for signoff. Skipping
# Magic.StreamOut also means KLayout.XOR (which diffs the two
# streamouts) has nothing to compare against; disable it accordingly.
meta:
  version: 3
  flow: Classic
  substituting_steps:
    Magic.StreamOut: null
    KLayout.XOR: null

RUN_MAGIC_STREAMOUT: false
RUN_KLAYOUT_XOR: false

DESIGN_NAME: fft4
VERILOG_FILES:
  - dir::src/fft4.v
CLOCK_PORT: clk
CLOCK_PERIOD: 50

# Die area (auto-estimated -- adjust if design doesn't fit)
FP_SIZING: absolute
DIE_AREA: [0.0, 0.0, 300.0, 300.0]

# Power/Ground
VDD_NETS:
  - VDD
GND_NETS:
  - VSS

# Prefer KLayout-generated GDS for signoff (matches
# wafer-space/gf180mcu-project-template upstream).
PRIMARY_GDSII_STREAMOUT_TOOL: klayout

# ESD & Layer Rules (GF180MCU standard)
DIODE_ON_PORTS: in
RT_MAX_LAYER: Metal4
PDN_MULTILAYER: false

# PDN Strap Configuration
PDN_VWIDTH: 5
PDN_HWIDTH: 5
PDN_VSPACING: 1
PDN_HSPACING: 1
PDN_VPITCH: 75
PDN_HPITCH: 75
PDN_EXTEND_TO: boundary

# Placement
PL_TARGET_DENSITY_PCT: 65
MAX_FANOUT_CONSTRAINT: 10

# CTS
CTS_CLK_MAX_WIRE_LENGTH: 0
CTS_DISTANCE_BETWEEN_BUFFERS: 0
CTS_SINK_CLUSTERING_SIZE: 20
CTS_SINK_CLUSTERING_MAX_DIAMETER: 60

# Repair After Placement
DESIGN_REPAIR_MAX_SLEW_PCT: 35
DESIGN_REPAIR_MAX_CAP_PCT: 30
DESIGN_REPAIR_MAX_WIRE_LENGTH: 0

# Repair After Routing
GRT_DESIGN_REPAIR_MAX_CAP_PCT: 20
GRT_DESIGN_REPAIR_MAX_SLEW_PCT: 20
GRT_DESIGN_REPAIR_MAX_WIRE_LENGTH: 0
RUN_POST_GRT_DESIGN_REPAIR: true

# Margins
TOP_MARGIN_MULT: 1
BOTTOM_MARGIN_MULT: 1
LEFT_MARGIN_MULT: 6
RIGHT_MARGIN_MULT: 6
